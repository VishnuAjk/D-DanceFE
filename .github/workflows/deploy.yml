name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/D-DanceShared
          path: D-DanceShared
          token: ${{ secrets.SHARED_REPO_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install shared dependencies
        run: pnpm install --frozen-lockfile
        working-directory: D-DanceShared

      - name: Build shared package
        run: pnpm build
        working-directory: D-DanceShared

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more GitHub Actions secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        working-directory: app
